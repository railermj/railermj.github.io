<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #FFFFFF;
            background: #F8C8DC;
        }

        header {
            background: #F8C8DC;
            color: rgb(255, 255, 255);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #3498db;
        }

        section {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: white;
            text-align: center;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .gallery-item {
            width: 100%;
            text-align: center;
        }

        .gallery-item h3 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .gallery-item audio {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }

        footer a {
            color: #3498db;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Portfolio</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="graphics.html">Graphics</a></li>
                <li><a href="video.html">Video</a></li>
                <li><a href="audio.html">Audio</a></li>
            </ul>
        </nav>
    </header>

    <section>
        <h1>Audio Gallery</h1>
        <div class="gallery">
            <div class="gallery-item">
                <h3>Break It Right Back X Who Hurt You</h3>
                <audio controls>
                    <source src="audio/Break_it_Right_Back_X_Who_Hurt_You (6).mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="gallery-item">
                <h3>Soundtrack</h3>
                <audio controls>
                    <source src="audio/New_Personal_Project.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="gallery-item">
                <h3>Social Issue Remix Madi</h3>
                <audio controls>
                    <source src="audio/Social_issue_Remix_Madi.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 My Portfolio. All rights reserved.</p>
    </footer>
</body>
</html>
